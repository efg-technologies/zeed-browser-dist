app-id: run.zeed.Browser
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
base: org.chromium.Chromium.BaseApp
base-version: '25.08'
command: zeed
separate-locales: false
build-options:
  no-debuginfo: true

finish-args:
  - --require-version=1.8.2 # expose-pids (zypak)
  - --device=all # webcam
  - --share=ipc
  - --share=network
  - --socket=cups
  - --socket=pulseaudio
  - --socket=x11
  - --socket=wayland
  - --system-talk-name=org.freedesktop.UPower
  - --talk-name=org.freedesktop.FileManager1
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.kde.kwalletd5
  - --talk-name=org.kde.kwalletd6
  - --own-name=org.mpris.MediaPlayer2.zeed.*
  # Default download directory
  - --filesystem=xdg-download
  # Screen sharing via PipeWire
  - --filesystem=xdg-run/pipewire-0
  # PWA shortcut installation
  - --filesystem=home/.local/share/applications:create
  - --filesystem=home/.local/share/icons:create
  # Imported CA certificates
  - --persist=.pki

modules:
  # Sandbox shim: reroutes Chromium's sandbox to flatpak-spawn so the
  # browser sandbox works inside the Flatpak sandbox.
  - name: zypak
    sources:
      - type: git
        url: https://github.com/refi64/zypak
        tag: v2025.09
        commit: 693a71c5ffa80ec9c9ce2ae03b1ccc493c698e53
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

  - name: zeed
    buildsystem: simple
    build-commands:
      - mkdir -p /app/zeed
      - cp -a browser/. /app/zeed/
      - install -Dm755 zeed.sh /app/bin/zeed
      - install -Dm644 run.zeed.Browser.desktop -t /app/share/applications
      - install -Dm644 run.zeed.Browser.metainfo.xml -t /app/share/metainfo
      - install -Dm644 cobalt.ini -t /app/etc
      - install -Dm644 /app/zeed/product_logo_48.png /app/share/icons/hicolor/48x48/apps/run.zeed.Browser.png
      - install -Dm644 run.zeed.Browser-128.png /app/share/icons/hicolor/128x128/apps/run.zeed.Browser.png
      - install -Dm644 run.zeed.Browser-256.png /app/share/icons/hicolor/256x256/apps/run.zeed.Browser.png
      - install -Dm644 /app/zeed/LICENSE /app/share/licenses/run.zeed.Browser/LICENSE
    sources:
      # Version bump: update url + sha256 here and add a <release> entry in
      # run.zeed.Browser.metainfo.xml. sha256 must match the value the AUR
      # pipeline verified (packaging/aur/PKGBUILD sha256sums_x86_64).
      - type: archive
        url: https://github.com/efg-technologies/zeed-browser-dist/releases/download/v150.0.7871.46.64/zeed-150.0.7871.46.64-linux-x86_64.tar.xz
        sha256: 45ccadc7b78d29f4c0ede300a318062f3567f1f4aa68086504e2b9b14480a488
        dest: browser
        only-arches: [x86_64]
      - type: file
        path: zeed.sh
      - type: file
        path: run.zeed.Browser.desktop
      - type: file
        path: run.zeed.Browser.metainfo.xml
      - type: file
        path: cobalt.ini
      - type: file
        path: icons/run.zeed.Browser-128.png
      - type: file
        path: icons/run.zeed.Browser-256.png
