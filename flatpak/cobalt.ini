[Application]
# Without this, cobalt would infer "browser" from the app id
# (run.zeed.Browser) and look for /app/browser/browser.
Name=zeed
EntryPoint=/app/zeed/zeed
WrapperScript=/app/bin/zeed

[Zypak]
# The Zeed release tarball ships the sandbox helper as "chrome_sandbox"
# (underscore); zypak's auto-detection only checks "chrome-sandbox" /
# "zeed-sandbox".
SandboxFilename=chrome_sandbox

[DefaultFeatures]
# TreesInViz: works around an upstream Chromium 147 GPU-process FATAL
# (cc/trees/layer_tree_host_impl.cc CHECK, crbug.com/454680865). Same
# workaround as the AUR launcher; remove once fixed upstream. Users can
# re-enable via "features+=TreesInViz" in zeed-flags.conf.
Disabled=TreesInViz
