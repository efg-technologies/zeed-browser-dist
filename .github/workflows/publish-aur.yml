name: Publish to AUR

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 147.0.0). Defaults to the latest release tag."
        required: false
      pkgrel:
        description: "Package release number (default: 1). Bump when re-releasing the same version."
        required: false
        default: "1"

jobs:
  publish:
    runs-on: ubuntu-latest
    # Run inside Arch so makepkg/updpkgsums/namcap are native. We deploy
    # via a custom shell step (not KSXGitHub/github-actions-deploy-aur)
    # because that action ships a buggy v4.1.2 that commits on detached
    # HEAD and then `git push origin master` fails with "src refspec
    # master does not match any". Doing it by hand also lets us keep
    # the flow transparent.
    container:
      image: archlinux:latest
      options: --user root
    steps:
      - name: Install Arch deps
        run: |
          pacman -Sy --noconfirm --needed \
            base-devel git openssh pacman-contrib sudo which
          # makepkg refuses to run as root; set up a builder user.
          useradd -m -s /bin/bash builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
          chmod 440 /etc/sudoers.d/builder

      - name: Checkout dist repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Stamp pkgver + pkgrel
        # If pkgver changes vs what's in the committed PKGBUILD, reset
        # sha256sums_x86_64 to 'SKIP' so updpkgsums can populate it
        # from the freshly-uploaded tarball. Without this, Pre-flight
        # compares the NEW tarball against the PREVIOUS version's sha
        # and false-fails cross-version publishes triggered by
        # workflow_dispatch.
        run: |
          ver="${{ steps.version.outputs.version }}"
          rel="${{ inputs.pkgrel || '1' }}"
          current_ver="$(awk -F'=' '/^pkgver=/{print $2}' packaging/aur/PKGBUILD)"
          sed -i "s/^pkgver=.*/pkgver=${ver}/" packaging/aur/PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=${rel}/"  packaging/aur/PKGBUILD
          if [[ "$current_ver" != "$ver" ]]; then
            echo "pkgver changed ($current_ver → $ver) — resetting sha256sums_x86_64 to SKIP"
            sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('SKIP')/" packaging/aur/PKGBUILD
          fi

      - name: Pre-flight — committed sha must match GitHub tarball
        # Once a tarball is uploaded, its content must be immutable. If the
        # committed PKGBUILD sha doesn't match the downloaded tarball, it
        # means someone replaced the GitHub asset (breaks old users'
        # makepkg cache) or forgot to update sha after a new upload.
        # Fail loudly. Exception: 'SKIP' means first publish — updpkgsums
        # will fill it.
        run: |
          ver="${{ steps.version.outputs.version }}"
          committed_sha="$(awk -F"'" '/^sha256sums_x86_64=/{print $2}' packaging/aur/PKGBUILD)"

          if [[ -z "$committed_sha" || "$committed_sha" == "SKIP" ]]; then
            echo "No committed sha256 yet (first publish of v${ver}). updpkgsums will populate it."
            exit 0
          fi

          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${ver}/zeed-${ver}-linux-x86_64.tar.xz"
          echo "Downloading $url"
          curl -sL --fail "$url" -o /tmp/zeed-check.tar.xz || {
            echo "::error::Failed to download $url"
            exit 1
          }
          actual_sha="$(sha256sum /tmp/zeed-check.tar.xz | awk '{print $1}')"

          if [[ "$committed_sha" != "$actual_sha" ]]; then
            echo "::error::sha256 mismatch for v${ver}"
            echo "  committed:  $committed_sha  (packaging/aur/PKGBUILD)"
            echo "  downloaded: $actual_sha      (GitHub Release)"
            exit 1
          fi

          echo "✓ Committed sha matches downloaded tarball"

      - name: SSH setup for AUR
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p /home/builder/.ssh
          echo "$AUR_SSH_PRIVATE_KEY" > /home/builder/.ssh/aur
          chmod 600 /home/builder/.ssh/aur
          cat > /home/builder/.ssh/config <<'EOF'
          Host aur.archlinux.org
              User aur
              IdentityFile ~/.ssh/aur
              IdentitiesOnly yes
              StrictHostKeyChecking accept-new
          EOF
          chmod 600 /home/builder/.ssh/config
          ssh-keyscan -t rsa,ed25519 aur.archlinux.org >> /home/builder/.ssh/known_hosts 2>/dev/null
          chown -R builder:builder /home/builder/.ssh

      - name: Stage files for builder
        # Copy the stamped PKGBUILD + assets to a world-readable staging
        # dir that the builder user can reach without going through
        # GITHUB_WORKSPACE (which has root-only perms inside the
        # container).
        run: |
          mkdir -p /tmp/staging
          cp packaging/aur/PKGBUILD /tmp/staging/
          cp packaging/aur/zeed.sh /tmp/staging/
          cp packaging/aur/zeed.desktop /tmp/staging/
          chmod 644 /tmp/staging/*
          chown -R builder:builder /tmp/staging

      - name: Push to AUR (as builder)
        # Clone the AUR repo, force-checkout master (clone often lands in
        # detached HEAD — this is the exact bug the KSXGitHub action
        # couldn't handle). Swap in the staged files, run updpkgsums to
        # refresh the sha from the actually-uploaded tarball, regenerate
        # .SRCINFO, commit on master, push.
        run: |
          sudo -u builder -i bash <<'BUILDER_EOF'
          set -euo pipefail
          cd /tmp
          rm -rf aur-repo
          git clone ssh://aur@aur.archlinux.org/zeed-bin.git aur-repo
          cd aur-repo
          git checkout -B master origin/master

          cp /tmp/staging/PKGBUILD .
          cp /tmp/staging/zeed.sh .
          cp /tmp/staging/zeed.desktop .

          updpkgsums
          makepkg --printsrcinfo > .SRCINFO

          git -c user.name="zeed-release-bot" \
              -c user.email="release@efg-technologies.com" \
              add PKGBUILD .SRCINFO zeed.sh zeed.desktop
          if git diff --cached --quiet; then
            echo "Nothing changed — skipping push"
            exit 0
          fi
          pkgver="$(awk -F'=' '/^pkgver=/{print $2}' PKGBUILD)"
          pkgrel="$(awk -F'=' '/^pkgrel=/{print $2}' PKGBUILD)"
          git -c user.name="zeed-release-bot" \
              -c user.email="release@efg-technologies.com" \
              commit -m "Release ${pkgver}-${pkgrel}"
          git push origin master
          BUILDER_EOF
