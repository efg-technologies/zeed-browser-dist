name: Publish deb to Release assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 147.0.7727.55.46)."
        required: false
      pkgrel:
        description: "Debian revision (default 1)."
        required: false
        default: "1"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to upload assets to the release
    steps:
      - name: Checkout dist repo
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends dpkg fakeroot xz-utils

      - name: Resolve version
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download release tarball
        env:
          VER: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VER}/zeed-${VER}-linux-x86_64.tar.xz"
          echo "Downloading $url"
          curl -sL --fail -o "dist/zeed-${VER}-linux-x86_64.tar.xz" "$url"
          ls -lh dist/

      - name: Build .deb
        env:
          VER:    ${{ steps.version.outputs.version }}
          PKGREL: ${{ inputs.pkgrel || '1' }}
        run: |
          ./packaging/deb/make-deb.sh \
            "dist/zeed-${VER}-linux-x86_64.tar.xz" \
            "${VER}" \
            "${PKGREL}"
          ls -lh dist/

      - name: Upload .deb to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VER:      ${{ steps.version.outputs.version }}
          PKGREL:   ${{ inputs.pkgrel || '1' }}
        run: |
          deb="dist/zeed-browser_${VER}-${PKGREL}_amd64.deb"
          sha="$deb.sha256"
          gh release upload "v${VER}" "$deb" "$sha" \
              --repo "$GITHUB_REPOSITORY" --clobber
          echo "✅ Uploaded $(basename "$deb")"

      - name: Smoke test — dpkg can parse the produced .deb
        env:
          VER:    ${{ steps.version.outputs.version }}
          PKGREL: ${{ inputs.pkgrel || '1' }}
        run: |
          dpkg-deb --info "dist/zeed-browser_${VER}-${PKGREL}_amd64.deb"
          dpkg-deb --contents "dist/zeed-browser_${VER}-${PKGREL}_amd64.deb" | head -20
